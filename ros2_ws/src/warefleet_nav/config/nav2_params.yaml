# Minimal Nav2 parameters for a WareFleet robot.
# This is a trimmed starting point — expand from the Nav2 default params as you
# tune (Week 2). Each robot is launched with these params under its namespace.

amcl:
  ros__parameters:
    use_sim_time: true
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    max_particles: 2000
    min_particles: 500
    laser_model_type: "likelihood_field"

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      max_vel_x: 0.4
      max_vel_theta: 1.0

planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5

bt_navigator:
  ros__parameters:
    use_sim_time: true

# NOTE: When WareFleet's MAPF layer supplies a PathPlan, the agent feeds those
# waypoints to the controller directly (bypassing the global planner) so the
# fleet-level deconfliction is respected. See warefleet_agent.
